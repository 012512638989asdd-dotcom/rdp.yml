name: Windows Server RDP

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Session duration (minutes)'
        required: false
        default: '360'

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 720

    steps:
      - name: Setup RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create User
        shell: powershell
        run: |
          $password = "Admin@" + ([guid]::NewGuid().ToString().Substring(0,12))
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "Admin" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "Admin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Admin"
          echo "PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\tailscale.msi" -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\tailscale.msi`" /quiet /norestart" -Wait

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname="win-$env:GITHUB_RUN_ID"
          
          Write-Host "Waiting for Tailscale to connect..."
          Start-Sleep -Seconds 20
          
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "IP from command: '$ip'"
          
          if (-not $ip) {
              Write-Host "Retrying..."
              Start-Sleep -Seconds 10
              $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          }
          
          if (-not $ip) {
              $ip = "CHECK_TAILSCALE_MANUALLY"
              Write-Host "WARNING: Could not auto-detect IP"
          }
          
          echo "IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Final Tailscale IP: $ip"

      - name: Show Info
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "========================================="
          Write-Host "  CONNECTION INFO"
          Write-Host "========================================="
          Write-Host ""
          Write-Host "Address: $env:IP"
          Write-Host "Username: Admin"
          Write-Host "Password: $env:PASSWORD"
          Write-Host ""
          Write-Host "RDP Command:"
          Write-Host "  mstsc.exe /v:$env:IP"
          Write-Host ""
          Write-Host "========================================="
          Write-Host ""
          Write-Host "IF IP IS MISSING, run this in Tailscale CLI:"
          Write-Host "  tailscale ip -4"
          Write-Host ""

      - name: Keep Alive
        shell: powershell
        run: |
          $duration = [int]("${{ github.event.inputs.duration }}")
          for ($i = 0; $i -lt $duration; $i++) {
              Write-Host "$(Get-Date -Format 'HH:mm:ss') Session active - $($duration - $i) minutes left"
              Start-Sleep -Seconds 60
          }
